plot:
  edgelist: "0->3, 1->3, 2->3"
  vcolor: [orange, orange, gray, gray]
  ecolor: black
  vshape: [square, square, square, circle]
  vsize: [1.0, 1.0, .5, .5]
  elinetype: [1, 1, 2]
  layout:
    x: [0, 0, 0, 1]
    y: [.5, 0, -0.5, 0]
math: |
  \sum_{k\in B_2} \sum_{i<j \in B_1} \mathbf{1}(x_i = x_j) y_{ik} y_{jk}
