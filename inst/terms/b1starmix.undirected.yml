plot:
  edgelist: "0->1, 0->2"
  vcolor: [orange, "#008080", "#008080"]
  vshape: [square, circle, circle]
  vsize: [1.0, 1.0, 1.0]
  ecolor: black
  layout:
    x: [0, 1, 1]
    y: [0, .5, -.5]
math: |
  \sum_{i \in B_1} \mathbf{1}(x_i = p) \sum_{j_1 < \cdots < j_k \in B_2} \prod_{l=1}^{k} y_{i j_l} \mathbf{1}(x_{j_l} = q)
