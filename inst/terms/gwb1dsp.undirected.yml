plot:
  edgelist: "0->2, 0->3, 0->4, 1->2, 1->3, 1->4"
  vcolor: [black , black , black , black, black]
  vshape: [square , square , circle , circle, circle]
  vsize: [1.0, 1.0, .5, .5, .5]
  ecolor: black
  layout:
    x: [0, 0, 1, 1, 1]
    y: [-.25, .25, .5, .0, -.5]
math: |
  \exp{(\tau)} \sum_{i=1}^{n_{B_2}} \left[1 - \left(1 - \exp{(-\tau)}\right)^i\right] DP_i(y)
