plot:
  edgelist: "0->2, 2->1, 0->3, 3->1, 0->4, 4->1"
  vcolor: [black, gray, gray, gray, black]
  vsize: [1.0, .5, .5, .5, 1.0]
  ecolor: gray
  layout:
    x: [0, .5, .5, .5, 1]
    y: [0, .45, .85, 1.25, 0]
math: |
  \exp{(\tau)} \sum_{i=1}^{n-2} \left[1 - \left(1 - \exp{(-\tau)}\right)^i\right] DP_i(y)
