plot:
  edgelist: "0->2, 1->2, 0->3, 1->3, 0->4, 1->4"
  vcolor: [black, black, gray, gray, gray]
  vsize: [1.0, 1.0, .5, .5, .5]
  ecolor: gray
  layout:
    x: [0, 1, .5, .5, .5]
    y: [0, 0, .45, .85, 1.25]
math: |
  \exp{(\tau)} \sum_{i=1}^{n-2} \left[1 - \left(1 - \exp{(-\tau)}\right)^i\right] DP_i(y)
