plot:
  edgelist: "0->1, 0->2, 2->1, 0->3, 3->1"
  vcolor: [black, black, black, black]
  vshape: [square, square, circle, circle]
  vsize: [1.0, 1.0, .5, .5]
  ecolor: black
  layout:
    x: [0, 1, .5, .5]
    y: [0, 0, .5, -.5]
math: |
  \exp{(\tau)} \sum_{i=1}^{n-2} \left[1 - \left(1 - \exp{(-\tau)}\right)^i\right] EP_i(y)
